<!DOCTYPE html>
<html>
<head>
    <title>Attendify Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="logo">
            <h1><span><i class="fas fa-graduation-cap"></i></span> Attendify</h1>
        </div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to manage your attendance</p>
        
        <form method="POST">
            <input name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <div style="margin: 15px 0; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" name="remember" id="remember" style="width: 18px; height: 18px; margin: 0;">
                <label for="remember" style="cursor: pointer; margin: 0; font-size: 14px;">Remember me</label>
            </div>
            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
            
            {% if error %}
                <div class="alert alert-error" style="margin-top: 15px;">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </div>
            {% endif %}
        </form>
        
        <div class="links">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</div>

</body>
</html>
