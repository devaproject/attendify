<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendify | Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo-area">
            <div class="icon"><i class="fas fa-graduation-cap"></i></div>
            <h1>Attendify</h1>
        </div>
        
        <nav>
            <a href="/dashboard">
                <i class="fas fa-home icon"></i>
                <span>Dashboard</span>
            </a>
            <a href="/students" class="active">
                <i class="fas fa-users icon"></i>
                <span>Students</span>
            </a>
            <a href="/attendance">
                <i class="fas fa-calendar-check icon"></i>
                <span>Attendance</span>
            </a>
            <a href="/history">
                <i class="fas fa-history icon"></i>
                <span>History</span>
            </a>
            <a href="/reports">
                <i class="fas fa-chart-bar icon"></i>
                <span>Reports</span>
            </a>
            <a href="/settings">
                <i class="fas fa-cog icon"></i>
                <span>Settings</span>
            </a>
            <a href="/logout">
                <i class="fas fa-sign-out-alt icon"></i>
                <span>Logout</span>
            </a>
        </nav>
        
        <div class="user-info">
            <div class="avatar">{{ session.get('user_name', 'U')[0].upper() }}</div>
            <div class="details">
                <div class="name">{{ session.get('user_name', 'User') }}</div>
                <div class="role">Administrator</div>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main">

        <div class="page-header">
            <h2>Edit Student</h2>
            <p>Update student information.</p>
        </div>

        <!-- ===== EDIT FORM ===== -->
        <div class="content-card">
            <div class="card-header">
                <h3><i class="fas fa-user-edit" style="color: var(--warning); margin-right: 10px;"></i>Update Student Information</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input 
                            type="text" 
                            name="name" 
                            value="{{ student[1] }}" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input 
                            type="email" 
                            name="email" 
                            value="{{ student[2] }}" 
                            required
                        >
                    </div>

                    {% if error %}
                    <div class="alert alert-error" style="margin-bottom: 15px;">
                        <i class="fas fa-exclamation-circle"></i> {{ error }}
                    </div>
                    {% endif %}

                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <a href="/students" class="btn" style="background: var(--muted); color: white; margin-left: 10px;">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
