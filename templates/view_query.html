<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendify | Query Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <div class="logo-area">
            <div class="icon"><i class="fas fa-graduation-cap"></i></div>
            <h1>Attendify</h1>
        </div>
    </div>

    <div class="main" style="margin: 0; max-width: 700px; margin: 50px auto;">

        <div class="page-header">
            <h2>Query Details</h2>
            <a href="/services" class="btn btn-secondary">&larr; Back to Services</a>
        </div>

        <div class="content-card">
            <div class="card-header">
                <h3>{{ query[1] }}</h3>
            </div>
            <div class="card-body">
                <p><strong>Status:</strong> 
                    {% if query[3] == 'pending' %}
                    <span class="status-badge" style="background: var(--warning); color: white;">Pending</span>
                    {% else %}
                    <span class="status-badge" style="background: var(--success); color: white;">Resolved</span>
                    {% endif %}
                </p>
                <p><strong>Date:</strong> {{ query[4] }}</p>
                <hr style="margin: 20px 0;">
                <p><strong>Message:</strong></p>
                <div style="background: var(--light); padding: 15px; border-radius: 8px; white-space: pre-wrap;">{{ query[2] }}</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
