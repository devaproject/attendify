<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendify | Confirm Reset</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <div class="logo-area">
            <div class="icon"><i class="fas fa-graduation-cap"></i></div>
            <h1>Attendify</h1>
        </div>
    </div>

    <div class="main" style="margin: 0; max-width: 450px; margin: 50px auto;">

        <div class="page-header">
            <h2>Reset Today's Attendance</h2>
            <p>Enter your password to confirm.</p>
        </div>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <div class="content-card">
            <div class="card-header" style="background: var(--danger);">
                <h3><i class="fas fa-exclamation-triangle"></i> Confirm Action</h3>
            </div>
            <div class="card-body">
                <p style="margin-bottom: 20px; color: var(--danger);">
                    <strong>Warning:</strong> This will delete ALL attendance records for today. This action cannot be undone.
                </p>
                
                <form method="POST">
                    <div class="form-group">
                        <label>Your Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-danger" style="width: 100%;">
                        <i class="fas fa-trash"></i> Reset Attendance
                    </button>
                </form>
                
                <a href="/settings" class="btn" style="background: var(--muted); width: 100%; margin-top: 10px; text-align: center;">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
