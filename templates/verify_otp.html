<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendify | Verify Email</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <div class="logo-area">
            <div class="icon"><i class="fas fa-graduation-cap"></i></div>
            <h1>Attendify</h1>
        </div>
    </div>

    <div class="main" style="margin: 0; max-width: 500px; margin: 50px auto;">

        <div class="page-header">
            <h2>Verify Email</h2>
            <p>Enter the OTP sent to <strong>{{ email }}</strong></p>
        </div>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <div class="content-card">
            <div class="card-header">
                <h3><i class="fas fa-envelope"></i> Email Verification</h3>
            </div>
            <div class="card-body">
                <p style="margin-bottom: 20px;">
                    We sent a verification code to your email. 
                    Enter the 6-digit code below.
                </p>
                
                <div class="alert alert-success" style="margin-bottom: 15px;">
                    <i class="fas fa-info-circle"></i> 
                    <strong>Demo mode:</strong> Check the terminal/console for OTP code!
                </div>
                
                <form method="POST">
                    <div class="form-group">
                        <label>Verification Code</label>
                        <input type="text" name="otp" placeholder="Enter 6-digit code" 
                               required maxlength="6" pattern="[0-9]{6}"
                               style="font-size: 24px; text-align: center; letter-spacing: 5px;">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-check"></i> Verify
                    </button>
                </form>
                
                <div style="margin-top: 20px; text-align: center;">
                    <p style="color: var(--muted);">Didn't receive code?</p>
                    <a href="/resend-otp" class="btn btn-secondary">
                        <i class="fas fa-redo"></i> Resend OTP
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
